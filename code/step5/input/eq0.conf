#NAMD3 minimization uses CPU code this setting is required for cpu
CUDASOAintegrate    off

# Forcefield/Topology Information
paraTypeCharmm      off
amber               yes
coordinates         ../../../build/complex.pdb
parmfile            ../../../build/complex.top
readexclusions      no

# Unchanging information
################################################################################
# Force-Field Parameters
exclude             scaled1-4
1-4scaling          0.833333
cutoff              12.
switching           on
switchdist          10.
pairlistdist        13.5
# Integrator Parameters
timestep            2.0  ;# 2fs/step
rigidBonds          all  ;# needed for 2fs steps
rigidtolerance      0.00001
rigidIterations     100
nonbondedFreq       1
fullElectFrequency  2
stepspercycle       10
wrapWater           on
wrapAll             on
# Output
outputEnergies      10000
outputPressure      10000

# Protocol specific information
################################################################################
CELL

PME                 yes
PMEGridSpacing      1.0

# Langevin temperature
langevin            on    ;# do langevin dynamics
langevinDamping     5     ;# damping coefficient (gamma) of 5/ps
langevinTemp        300
langevinHydrogen    no    ;# dont couple langevin bath to hydrogens

temperature 50

# Output and restart
set output_root "eq0"
stdout [format $output_root.log]
outputname [format $output_root]
restartname [format $output_root]
XSTfile [format $output_root.xst]

binaryoutput        yes
binaryrestart       yes
restartfreq         1000
xstFreq             1000
#dcdfreq   5000
#DCDUnitcell  yes

# Position constraints
constraints         on
consexp             2
consref             ../../../build/complex.pdb ;#need all positions
conskfile           ../../../build/cons.pdb
conskcol            O

# protocol - minimization
set factor 1
set nall 10
set n 1

minimization    on
while {$n <= $nall} {
   constraintScaling $factor
   minimize 1000
   set n [expr $n + 1]
   set factor [expr $factor * 0.5]
}

constraintScaling 0
minimize 1000
